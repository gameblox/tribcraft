<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TribCraft</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

canvas{
    display:block;
}

#crosshair{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:30px;
    z-index:10;
}

#loading{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
    z-index:10;
}

</style>
</head>
<body>

<div id="crosshair">+</div>
<div id="loading">Cargando TribCraft...</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';


// =====================
// ZYRA5
// =====================

const zyraAnimals = {

    vaca:{
        amount:10,
        minX:20,
        maxX:80,
        minZ:-80,
        maxZ:-20
    },

    caballo:{
        amount:5,
        minX:-20,
        maxX:20,
        minZ:-20,
        maxZ:20
    },

    lobo:{
        amount:6,
        minX:-120,
        maxX:-40,
        minZ:-40,
        maxZ:40
    },

    zebra:{
        amount:7,
        minX:40,
        maxX:120,
        minZ:40,
        maxZ:120
    },

    jirafa:{
        amount:3,
        minX:-30,
        maxX:40,
        minZ:40,
        maxZ:100
    }

};


// =====================
// ESCENA
// =====================

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87ceeb);


// =====================
// CAMARA
// =====================

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    3000
);

camera.position.set(0,10,20);


// =====================
// RENDER
// =====================

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);


// =====================
// CONTROLES
// =====================

const controls = new OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;


// =====================
// LUCES
// =====================

const ambient = new THREE.AmbientLight(
    0xffffff,
    1.5
);

scene.add(ambient);


const sun = new THREE.DirectionalLight(
    0xffffff,
    3
);

sun.position.set(100,100,100);

sun.castShadow = true;

scene.add(sun);


// =====================
// LOADER
// =====================

const loader = new GLTFLoader();


// =====================
// MAPA
// =====================

loader.load(

    'scene.gltf',

    function(gltf){

        const world = gltf.scene;

        world.scale.set(1,1,1);

        scene.add(world);

        document.getElementById('loading').innerHTML = 'Mapa cargado';

    }

);


// =====================
// PLAYER
// =====================

loader.load(

    'warrior.glb',

    function(gltf){

        const player = gltf.scene;

        player.position.set(0,2,0);

        player.scale.set(2,2,2);

        scene.add(player);

    }

);


// =====================
// HACHA
// =====================

loader.load(

    'hacha.glb',

    function(gltf){

        const axe = gltf.scene;

        axe.position.set(2,1,0);

        axe.scale.set(2,2,2);

        scene.add(axe);

    }

);


// =====================
// PICO
// =====================

loader.load(

    'pico.glb',

    function(gltf){

        const pickaxe = gltf.scene;

        pickaxe.position.set(-2,1,0);

        pickaxe.scale.set(2,2,2);

        scene.add(pickaxe);

    }

);


// =====================
// SPAWN ANIMALES
// =====================

function spawnAnimals(path,config,scale=1){

    loader.load(path,function(gltf){

        const baseModel = gltf.scene;

        for(let i=0; i<config.amount; i++){

            const animal = baseModel.clone();

            animal.position.x =
                Math.random() *
                (config.maxX - config.minX)
                + config.minX;

            animal.position.z =
                Math.random() *
                (config.maxZ - config.minZ)
                + config.minZ;

            animal.position.y = 0;

            animal.scale.set(scale,scale,scale);

            scene.add(animal);

        }

    });

}


spawnAnimals('vaca.glb',zyraAnimals.vaca,2);
spawnAnimals('caballo.glb',zyraAnimals.caballo,2);
spawnAnimals('lobo.glb',zyraAnimals.lobo,2);
spawnAnimals('zebra.glb',zyraAnimals.zebra,2);
spawnAnimals('jirafa.glb',zyraAnimals.jirafa,3);


// =====================
// LEON
// =====================

function spawnLion(){

    loader.load(

        'leon.glb',

        function(gltf){

            const lion = gltf.scene;

            lion.position.set(130,0,130);

            lion.scale.set(3,3,3);

            scene.add(lion);

        }

    );

}


spawnLion();

setInterval(function(){

    spawnLion();

},300000);


// =====================
// MOVIMIENTO
// =====================

const keys = {};

window.addEventListener('keydown',e=>{

    keys[e.key.toLowerCase()] = true;

});

window.addEventListener('keyup',e=>{

    keys[e.key.toLowerCase()] = false;

});


function movement(){

    if(keys['w']) camera.position.z -= 0.5;

    if(keys['s']) camera.position.z += 0.5;

    if(keys['a']) camera.position.x -= 0.5;

    if(keys['d']) camera.position.x += 0.5;

}


// =====================
// RESIZE
// =====================

window.addEventListener('resize',()=>{

    camera.aspect =
    window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});


// =====================
// LOOP
// =====================

function animate(){

    requestAnimationFrame(animate);

    movement();

    controls.update();

    renderer.render(scene,camera);

}

animate();

</script>
</body>
</html>
